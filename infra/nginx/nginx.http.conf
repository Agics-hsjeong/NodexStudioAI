# 인증서 없을 때: HTTP만 (Let's Encrypt webroot 발급 가능)
worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  resolver 127.0.0.11 valid=10s ipv6=off;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # --- Production: www = SPA ---
  server {
    listen 80;
    server_name www.nodexstudio.kro.kr nodexstudio.kro.kr;

    set $frontend_upstream http://frontend:3000;

    client_max_body_size 25m;

    # ^~ : 정규식보다 우선, Vite/SPA로 프록시되지 않도록 고정
    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    location / {
      proxy_pass $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }

  # --- Production: api = Django /api 매핑 ---
  server {
    listen 80;
    server_name api.nodexstudio.kro.kr;

    set $backend_upstream http://backend:8000;

    client_max_body_size 25m;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    location / {
      proxy_pass $backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /static/ {
      proxy_pass $backend_upstream/static/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }

  # --- 로컬/내부: 한 호스트에서 /api + 프론트 ---
  server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 nginx _;

    set $frontend_upstream http://frontend:3000;
    set $backend_upstream http://backend:8000;

    client_max_body_size 25m;

    location = /api {
      return 308 /api/;
    }

    location /api/ {
      proxy_pass $backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /static/ {
      proxy_pass $backend_upstream/static/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }
}
