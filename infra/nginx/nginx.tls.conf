# Let's Encrypt 인증서가 있을 때: HTTP(ACME + HTTPS로 리다이렉트) + HTTPS
# certbot -d 순서의 첫 도메인 폴더명: www.nodexstudio.kro.kr
worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  resolver 127.0.0.11 valid=10s ipv6=off;
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # --- www: HTTP -> HTTPS ---
  server {
    listen 80;
    server_name www.nodexstudio.kro.kr nodexstudio.kro.kr;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name www.nodexstudio.kro.kr nodexstudio.kro.kr;

    ssl_certificate     /etc/letsencrypt/live/www.nodexstudio.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.nodexstudio.kro.kr/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    set $frontend_upstream http://frontend:3000;

    client_max_body_size 25m;

    location / {
      proxy_pass $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }
  }

  # --- api: HTTP -> HTTPS ---
  server {
    listen 80;
    server_name api.nodexstudio.kro.kr;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.nodexstudio.kro.kr;

    ssl_certificate     /etc/letsencrypt/live/www.nodexstudio.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.nodexstudio.kro.kr/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    set $backend_upstream http://backend:8000;

    client_max_body_size 25m;

    location / {
      proxy_pass $backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }

    location /static/ {
      proxy_pass $backend_upstream/static/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 300s;
    }
  }

  # --- 로컬: HTTP만 (TLS 없음) ---
  server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 nginx _;

    set $frontend_upstream http://frontend:3000;
    set $backend_upstream http://backend:8000;

    client_max_body_size 25m;

    location = /api {
      return 308 /api/;
    }

    location /api/ {
      proxy_pass $backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /static/ {
      proxy_pass $backend_upstream/static/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass $frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }
  }
}
