# 호스트(Ubuntu 패키지 nginx)가 이미 80 을 쓰고 Docker 는 127.0.0.1:8188 만 열 때 사용하는 예시입니다.
# 잘못된 설정: return 302 https://192.168.x.x:8188/  → Let's Encrypt 가 실패합니다.
# 올바른 설정: 아래처럼 HTTP 로 로컬 Docker nginx 로 프록시(리다이렉트 금지).
#
# 적용: sudo cp ... /etc/nginx/sites-available/nodex-forward.conf
#       sudo ln -sf ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
#
# Docker 쪽 .env: NGINX_HTTP_PORT=8188 (호스트 80 은 패키지 nginx 가 점유)

server {
    listen 80;
    server_name www.nodexstudio.kro.kr nodexstudio.kro.kr;

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8188;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8188;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.nodexstudio.kro.kr;

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8188;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8188;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
