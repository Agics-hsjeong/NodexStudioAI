services:
  nginx:
    build:
      context: ./infra/nginx
    depends_on:
      - frontend
      - backend
    ports:
      # Let's Encrypt HTTP-01 은 인터넷→도메인:80 필요. 호스트 80 충돌 시 .env 에 NGINX_HTTP_PORT=8188 + 공유기 80→8188 또는 infra/nginx/host-forward-80.example.conf
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - nodex_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # 발급/갱신: docker compose --profile cert run --rm certbot ...
  certbot:
    image: certbot/certbot:v2.11.0
    volumes:
      - nodex_letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles: ["cert"]

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-/api}

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - db
      - redis
      - minio
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn nodex.wsgi:application -b 0.0.0.0:8000 --workers 2 --threads 4 --timeout 300"

  celery:
    build:
      context: ./backend
    command: celery -A nodex worker -l INFO -Q ingest,low -E
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
    depends_on:
      - backend
      - redis

  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - nodex_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - nodex_redisdata:/data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - nodex_miniodata:/data

volumes:
  nodex_pgdata:
  nodex_redisdata:
  nodex_miniodata:
  nodex_letsencrypt:
  certbot_www:

